name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter setup
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter clean + pub get + iOS setup
        run: |
          cd filcnaplo
          flutter clean
          flutter pub get
          flutter precache --ios

      - name: Install CocoaPods
        run: |
          cd filcnaplo/ios
          pod install --repo-update

      - name: Build IPA
        run: |
          cd filcnaplo
          flutter build ipa --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: filcnaplo/build/ios/ipa/
