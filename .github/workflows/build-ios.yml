name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter setup
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: |
          cd filcnaplo
          flutter pub get

      - name: Install CocoaPods
        run: |
          cd filcnaplo/ios
          pod install
          cd ..

      - name: Clean build
        run: |
          cd filcnaplo
          flutter clean


      - name: Disable Swift Package Manager
        run: |
              defaults write com.apple.dt.Xcode IDEPackageSupportUseBuiltinSCM YES

      - name: Build IPA
        run: |
          cd filcnaplo
          flutter build ipa --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: filcnaplo/build/ios/ipa/
